<svg viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
  <!-- Stacked layout: icon top, wordmark below, centered -->

  <!-- Icon (emblem) -->
  <g id="icon">
    <!-- Outer circle ring -->
    <circle cx="60" cy="40" r="35" fill="none" stroke="#3d2817" stroke-width="1.5"/>

    <!-- Inner circle (subtle) -->
    <circle cx="60" cy="40" r="30" fill="none" stroke="#c2a878" stroke-width="0.4"/>

    <!-- Driftwood leaf/branch motif -->
    <!-- Main stem -->
    <path d="M 60 10 Q 59 25, 60 40 Q 61 25, 60 10" fill="none" stroke="#3d2817" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Left branch 1 -->
    <path d="M 60 18 Q 52 17, 48 24" fill="none" stroke="#3d2817" stroke-width="1.4" stroke-linecap="round"/>

    <!-- Right branch 1 -->
    <path d="M 60 18 Q 68 17, 72 24" fill="none" stroke="#3d2817" stroke-width="1.4" stroke-linecap="round"/>

    <!-- Left branch 2 -->
    <path d="M 60 28 Q 51 26, 47 33" fill="none" stroke="#3d2817" stroke-width="1.3" stroke-linecap="round"/>

    <!-- Right branch 2 -->
    <path d="M 60 28 Q 69 26, 73 33" fill="none" stroke="#3d2817" stroke-width="1.3" stroke-linecap="round"/>

    <!-- Left branch 3 -->
    <path d="M 60 40 Q 52 40, 47 46" fill="none" stroke="#3d2817" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Right branch 3 -->
    <path d="M 60 40 Q 68 40, 73 46" fill="none" stroke="#3d2817" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <g id="wordmark">
    <!-- "Driftwood" in serif -->
    <text x="60" y="115" font-family="Georgia, serif" font-size="18" font-weight="400" fill="#1a1a1a" text-anchor="middle" letter-spacing="-0.5">Driftwood</text>

    <!-- "Coffee" in smaller sans -->
    <text x="60" y="135" font-family="Inter, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#3d2817" text-anchor="middle" letter-spacing="0.8">COFFEE</text>
  </g>
</svg>